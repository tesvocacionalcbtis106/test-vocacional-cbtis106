<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vocacional CBTis 106 - 105 Preguntas</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .question.unanswered { border-left: 4px solid #ef4444; }
        .radio-option { display: block; padding: 8px 12px; margin: 4px 0; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .radio-option:hover { background: #f0f9ff; }
        .radio-option input { margin-right: 8px; accent-color: #10b981; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .progress-text { font-weight: 600; }
        .loading-msg { text-align: center; padding: 40px; font-size: 1.1rem; color: #64748b; }
        .error-field { border: 2px solid #ef4444 !important; }
        .alert-error { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 16px; margin-bottom: 20px; color: #991b1b; }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div>
    </div>
 
    <div class="progress-container-fixed">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <span class="progress-text" id="progress-text">0/105 (0%)</span>
    </div>
 
    <div class="container">
        <div class="card fade-in">
            <div class="logo-container">
                <img src="logo.svg" alt="CBTis 106" class="logo">
            </div>
 
            <div id="alertBox"></div>
 
            <div id="formContainer">
                <p class="loading-msg">⏳ Cargando preguntas...</p>
            </div>
 
            <a href="index.html" class="btn btn-back">← Volver al inicio</a>
        </div>
    </div>
 
    <script>
    const CATEGORIAS = [
        { key: 'Dietetica',                        nombre: 'Dietética',                          emoji: '🥗' },
        { key: 'Programacion',                     nombre: 'Programación',                       emoji: '💻' },
        { key: 'Ciberseguridad',                   nombre: 'Ciberseguridad',                     emoji: '🔒' },
        { key: 'Electricidad',                     nombre: 'Electricidad',                       emoji: '⚡' },
        { key: 'Robótica_y_Automatización',        nombre: 'Robótica y Automatización',          emoji: '🤖' },
        { key: 'Recursos_Humanos',                 nombre: 'Recursos Humanos',                   emoji: '👥' },
        { key: 'Comercio_Internacional_y_Aduanas', nombre: 'Comercio Internacional y Aduanas',   emoji: '🌍' },
    ];
 
    const TOTAL = 105;
    const STORAGE_KEY = 'cbtis106_responses';
    const PERSONAL_KEY = 'cbtis106_personal';
 
    let globalPreguntas = null;
 
    // ─── Cargar preguntas y construir formulario ───────────────────────────
    fetch('preguntas.json')
        .then(r => r.json())
        .then(data => {
            globalPreguntas = data;
            buildForm(data);
            loadSaved();
            updateProgress();
        })
        .catch(() => {
            document.getElementById('formContainer').innerHTML =
                '<p class="loading-msg" style="color:#ef4444">❌ Error al cargar las preguntas. Recarga la página.</p>';
        });
 
    function buildForm(preguntas) {
        let html = `
        <div class="form-section">
            <h2 class="section-title">📋 Datos Personales</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre completo <span class="required">*</span></label>
                    <input type="text" id="nombre" maxlength="90" required class="input-field" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Edad (10-25) <span class="required">*</span></label>
                    <input type="number" id="edad" min="10" max="25" required class="input-field" placeholder="Tu edad">
                </div>
            </div>
            <div class="form-group">
                <label>Correo electrónico <span class="required">*</span></label>
                <input type="email" id="correo" required class="input-field" placeholder="tu@correo.com">
            </div>
        </div>`;
 
        let contador = 0;
        CATEGORIAS.forEach(cat => {
            const lista = preguntas[cat.key] || [];
            if (!lista.length) return;
            const inicio = contador + 1;
            const fin = contador + lista.length;
            html += `<div class="form-section">
                <h2 class="section-title">${cat.emoji} ${cat.nombre}</h2>
                <p class="section-desc">Preguntas ${inicio} - ${fin}</p>`;
            lista.forEach(texto => {
                contador++;
                html += `
                <div class="question" data-num="${contador}">
                    <div class="question-header">
                        <span class="question-num">${contador}.</span>
                        <span class="question-text">${texto}</span>
                    </div>
                    <div class="options">
                        ${[1,2,3,4,5].map((v, i) => {
                            const labels = ['Nada','Poco','Neutral','Bastante','Mucho'];
                            return `<label class="radio-option">
                                <input type="radio" name="p${contador}" value="${v}"> ${labels[i]}
                            </label>`;
                        }).join('')}
                    </div>
                </div>`;
            });
            html += `</div>`;
        });
 
        html += `<button type="button" class="btn btn-primary btn-submit" id="submitBtn" onclick="submitTest()">
            Enviar Test Completo
        </button>`;
 
        document.getElementById('formContainer').innerHTML = html;
 
        // Escuchar cambios para guardar y actualizar progreso
        document.getElementById('formContainer').addEventListener('change', () => {
            saveProgress();
            updateProgress();
        });
        document.getElementById('nombre').addEventListener('input', saveProgress);
        document.getElementById('edad').addEventListener('input', saveProgress);
        document.getElementById('correo').addEventListener('input', saveProgress);
    }
 
    // ─── Guardar / cargar progreso ─────────────────────────────────────────
    function saveProgress() {
        const responses = {};
        for (let i = 1; i <= TOTAL; i++) {
            const checked = document.querySelector(`input[name="p${i}"]:checked`);
            if (checked) responses[`p${i}`] = checked.value;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(responses));
 
        const nombre = document.getElementById('nombre');
        const edad   = document.getElementById('edad');
        const correo = document.getElementById('correo');
        if (nombre && edad && correo) {
            localStorage.setItem(PERSONAL_KEY, JSON.stringify({
                nombre: nombre.value,
                edad:   edad.value,
                correo: correo.value,
            }));
        }
    }
 
    function loadSaved() {
        try {
            const savedR = localStorage.getItem(STORAGE_KEY);
            if (savedR) {
                const r = JSON.parse(savedR);
                Object.keys(r).forEach(k => {
                    const radio = document.querySelector(`input[name="${k}"][value="${r[k]}"]`);
                    if (radio) radio.checked = true;
                });
            }
            const savedP = localStorage.getItem(PERSONAL_KEY);
            if (savedP) {
                const p = JSON.parse(savedP);
                const n = document.getElementById('nombre');
                const e = document.getElementById('edad');
                const c = document.getElementById('correo');
                if (n) n.value = p.nombre || '';
                if (e) e.value = p.edad   || '';
                if (c) c.value = p.correo || '';
            }
        } catch(e) {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(PERSONAL_KEY);
        }
    }
 
    // ─── Progreso ──────────────────────────────────────────────────────────
    function updateProgress() {
        let answered = 0;
        for (let i = 1; i <= TOTAL; i++) {
            if (document.querySelector(`input[name="p${i}"]:checked`)) answered++;
        }
        const pct = Math.round(answered / TOTAL * 100);
        document.getElementById('progress').style.width = pct + '%';
        document.getElementById('progress-text').textContent = `${answered}/${TOTAL} (${pct}%)`;
 
        const btn = document.getElementById('submitBtn');
        if (btn) {
            btn.disabled = answered < TOTAL;
            btn.textContent = answered < TOTAL
                ? `Faltan ${TOTAL - answered} preguntas`
                : 'Enviar Test Completo ✅';
        }
 
        document.querySelectorAll('.question').forEach(q => {
            const num = q.dataset.num;
            q.classList.toggle('unanswered', !document.querySelector(`input[name="p${num}"]:checked`));
        });
    }
 
    // ─── Enviar y calcular ─────────────────────────────────────────────────
    function submitTest() {
        const alertBox = document.getElementById('alertBox');
        alertBox.innerHTML = '';
 
        // Validar datos personales
        const nombre = document.getElementById('nombre').value.trim();
        const edad   = parseInt(document.getElementById('edad').value);
        const correo = document.getElementById('correo').value.trim();
        const errores = [];
 
        if (!nombre || nombre.length < 2)            errores.push('El nombre es obligatorio.');
        if (!edad || edad < 10 || edad > 25)         errores.push('La edad debe estar entre 10 y 25 años.');
        if (!correo || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) errores.push('Ingresa un correo válido.');
 
        // Validar preguntas sin responder
        const missing = [];
        for (let i = 1; i <= TOTAL; i++) {
            if (!document.querySelector(`input[name="p${i}"]:checked`)) missing.push(i);
        }
        if (missing.length > 0) errores.push(`Faltan ${missing.length} preguntas sin responder.`);
 
        if (errores.length > 0) {
            alertBox.innerHTML = `<div class="alert-error"><h4>❌ Corrige los siguientes errores:</h4><ul>${errores.map(e => `<li>${e}</li>`).join('')}</ul></div>`;
            alertBox.scrollIntoView({ behavior: 'smooth' });
            if (missing.length > 0) {
                const firstMissing = document.querySelector(`[data-num="${missing[0]}"]`);
                if (firstMissing) firstMissing.scrollIntoView({ behavior: 'smooth' });
            }
            return;
        }
 
        // Calcular puntajes
        const puntajes = {};
        let contadorCat = 0;
        CATEGORIAS.forEach(cat => {
            const lista = globalPreguntas[cat.key] || [];
            let suma = 0;
            lista.forEach(() => {
                contadorCat++;
                const checked = document.querySelector(`input[name="p${contadorCat}"]:checked`);
                suma += checked ? parseInt(checked.value) : 0;
            });
            puntajes[cat.nombre] = suma;
        });
 
        // Ordenar por puntaje
        const sorted = Object.entries(puntajes).sort((a, b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3).map(e => e[0]);
        const carreraPrincipal = top3[0];
 
        // Guardar resultado en localStorage para resultado.html
        localStorage.setItem('cbtis106_resultado', JSON.stringify({
            nombre, edad, correo, puntajes, top3, carreraPrincipal
        }));
 
        // Limpiar progreso
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(PERSONAL_KEY);
 
        // Ir a resultado
        window.location.href = 'resultado.html';
    }
 
    // Avisar antes de salir si hay progreso guardado
    window.addEventListener('beforeunload', e => {
        if (localStorage.getItem(STORAGE_KEY)) {
            e.preventDefault();
            e.returnValue = 'Tienes respuestas guardadas. ¿Seguro que quieres salir?';
        }
    });
    </script>
</body>
</html>
