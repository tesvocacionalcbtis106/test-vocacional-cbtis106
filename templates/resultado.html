<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Test Vocacional CBTis 106</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        #no-result { text-align: center; padding: 40px; }
        #no-result a { display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div>
    </div>
 
    <div class="container">
        <div class="card fade-in" id="mainCard">
            <div class="logo-container">
                <img src="logo.svg" alt="CBTis 106" class="logo">
            </div>
            <div id="resultContent">
                <p style="text-align:center;padding:40px">Cargando resultados...</p>
            </div>
        </div>
    </div>
 
    <script>
    const ICON_MAP = {
        'Dietética':                          '🥗',
        'Programación':                       '💻',
        'Ciberseguridad':                     '🔒',
        'Electricidad':                       '⚡',
        'Robótica y Automatización':          '🤖',
        'Recursos Humanos':                   '👥',
        'Comercio Internacional y Aduanas':   '🌍',
    };
 
    const MENSAJES = {
        'Dietética': `<p>¡Felicidades! Tienes un gran interés por la salud y la nutrición. En <strong>Dietética</strong> aprenderás a diseñar planes alimenticios, trabajar en hospitales, clínicas y centros de salud, promoviendo estilos de vida saludables. ¡Tu vocación de ayudar a otros encontrará un camino profesional increíble!</p>`,
        'Programación': `<p>¡Excelente! Tu mente lógica y creativa te lleva hacia la <strong>Programación</strong>. Aprenderás a desarrollar aplicaciones, sitios web y software que impactan la vida de millones de personas. ¡El mundo digital te espera!</p>`,
        'Ciberseguridad': `<p>¡Sobresaliente! Tienes el perfil de un guardián digital. En <strong>Ciberseguridad</strong> aprenderás a proteger sistemas e información crítica. Los expertos en seguridad son de los profesionales más demandados del mundo. ¡Tu futuro es brillante!</p>`,
        'Electricidad': `<p>¡Genial! Tu habilidad técnica y práctica te dirige hacia la <strong>Electricidad</strong>. Aprenderás a instalar, mantener y reparar sistemas eléctricos en casas, industrias y más. ¡Una carrera con alta demanda laboral!</p>`,
        'Robótica y Automatización': `<p>¡Impresionante! Tienes la mente de un innovador. En <strong>Robótica y Automatización</strong> aprenderás a diseñar y programar robots y sistemas automáticos que son el futuro de la industria. ¡Tú serás parte de la revolución tecnológica!</p>`,
        'Recursos Humanos': `<p>¡Fantástico! Tu habilidad para relacionarte y liderar equipos te lleva a <strong>Recursos Humanos</strong>. Aprenderás a gestionar personas, mejorar ambientes laborales y desarrollar el talento humano en las organizaciones. ¡Las personas son el activo más valioso!</p>`,
        'Comercio Internacional y Aduanas': `<p>¡Extraordinario! Tu visión global y gusto por los negocios te dirige al <strong>Comercio Internacional y Aduanas</strong>. Aprenderás sobre importaciones, exportaciones, logística y tratados comerciales. ¡El mundo será tu mercado!</p>`,
    };
 
    window.addEventListener('DOMContentLoaded', () => {
        const raw = localStorage.getItem('cbtis106_resultado');
 
        if (!raw) {
            document.getElementById('resultContent').innerHTML = `
                <div id="no-result">
                    <h2>⚠️ No hay resultados</h2>
                    <p>Parece que no completaste el test todavía.</p>
                    <a href="test.html" class="btn btn-primary">Hacer el Test</a>
                    <a href="index.html" class="btn btn-back" style="margin-top:10px">← Inicio</a>
                </div>`;
            return;
        }
 
        const { nombre, edad, correo, puntajes, top3, carreraPrincipal } = JSON.parse(raw);
 
        // Ordenar puntajes de mayor a menor
        const puntajesOrdenados = Object.entries(puntajes).sort((a, b) => b[1] - a[1]);
 
        const medals = ['🥇', '🥈', '🥉'];
        const rankLabels = ['1er Lugar', '2do Lugar', '3er Lugar'];
        const rankClasses = ['gold', 'silver', 'bronze'];
 
        const top3HTML = top3.map((carrera, i) => {
            const score = puntajes[carrera] || 0;
            const pct = Math.round(score / 75 * 100);
            return `
            <div class="top3-item ${rankClasses[i]}">
                <div class="medal">${medals[i]}</div>
                <div class="top3-content">
                    <span class="top3-rank">${rankLabels[i]}</span>
                    <span class="top3-career">${carrera}</span>
                    <div class="score-bar">
                        <div class="score-fill" style="width:${pct}%"></div>
                    </div>
                    <span class="score-text">${score}/75 puntos</span>
                </div>
            </div>`;
        }).join('');
 
        const allScoresHTML = puntajesOrdenados.map(([esp, puntos]) => {
            const pct = Math.round(puntos / 75 * 100);
            return `
            <div class="score-card ${esp === carreraPrincipal ? 'highlight' : ''}">
                <div class="score-icon">${ICON_MAP[esp] || '📌'}</div>
                <div class="score-info">
                    <span class="score-name">${esp}</span>
                    <div class="score-progress">
                        <div class="score-progress-fill" style="width:${pct}%"></div>
                    </div>
                    <span class="score-value">${puntos}/75</span>
                </div>
            </div>`;
        }).join('');
 
        const mensajeMotivador = MENSAJES[carreraPrincipal] ||
            '<p>¡Felicidades por completar el test! Explora las recomendaciones y elige la carrera que más te apasiona.</p>';
 
        document.getElementById('resultContent').innerHTML = `
            <div class="header-content">
                <h1 class="title">📊 Resultados</h1>
                <p class="subtitle">Test Vocacional CBTis 106</p>
            </div>
 
            <div class="result-header">
                <p class="student-name">${nombre}</p>
                <p class="student-edad">${edad} años</p>
            </div>
 
            <div class="principal-career reveal">
                <div class="career-badge">
                    <span class="badge-icon">🎓</span>
                    <span class="badge-text">Carrera Principal</span>
                </div>
                <h2 class="career-name">${carreraPrincipal}</h2>
            </div>
 
            <div class="top3-section reveal">
                <h3 class="section-title">🏆 Top 3 Recomendaciones</h3>
                <div class="top3-container">${top3HTML}</div>
            </div>
 
            <div class="scores-section reveal">
                <h3 class="section-title">📈 Todos los puntajes</h3>
                ${allScoresHTML}
            </div>
 
            <div class="advisor-section reveal">
                <h3 class="section-title">💬 Mensaje de Orientación</h3>
                <div class="advisor-card">${mensajeMotivador}</div>
            </div>
 
            <div class="email-notice">
                <span class="email-icon">📧</span>
                <span>Resultados de: <strong>${correo}</strong></span>
            </div>
 
            <div class="buttons-container">
                <a href="test.html" class="btn btn-primary">
                    <span>🔁</span><span>Repetir Test</span>
                </a>
                <a href="index.html" class="btn btn-secondary">
                    <span>🏠</span><span>Inicio</span>
                </a>
            </div>`;
 
        // Confetti
        const end = Date.now() + 3000;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#1e3a5f','#10b981','#f59e0b','#3b82f6'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#1e3a5f','#10b981','#f59e0b','#3b82f6'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        })();
 
        // Animaciones reveal
        setTimeout(() => {
            document.querySelectorAll('.reveal').forEach((el, i) => {
                setTimeout(() => el.classList.add('visible'), i * 200);
            });
        }, 100);
 
        // Limpiar localStorage
        localStorage.removeItem('cbtis106_resultado');
    });
    </script>
</body>
</html>
